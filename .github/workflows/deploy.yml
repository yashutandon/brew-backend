name: Backend CD Pipeline

on:
  push:
    branches:
      - main  # Jab aap main branch par push karenge tabhi chale

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Project folder mein jana (Agar nahi hai to banana)
            mkdir -p ~/brew-be
            cd ~/brew-be

            # 2. GitHub se latest code lena
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # 3. Dependencies install karna
            npm install --production

            # 4. App ko restart karna (index.js ko apni main file se replace karein)
            pm2 restart all || pm2 start index.js --name "my-api"